    <script>
      if (typeof globalThis === 'undefined') {
        Object.defineProperty(Object.prototype, '__magic__', { get: function() { return this; }, configurable: true });
        __magic__.globalThis = __magic__;
        delete Object.prototype.__magic__;
      }
      if (typeof queueMicrotask === 'undefined') {
        window.queueMicrotask = function(callback) { Promise.resolve().then(callback).catch(function(e){setTimeout(function(){throw e;})}); };
      }
      var originalFetch = window.fetch;
      window.fetch = function(url, options) {
        if (typeof url === 'string') {
          var cleanUrl = url.split('?')[0];
          var isPlaylist = cleanUrl.endsWith('.m3u') || cleanUrl.endsWith('.m3u8');
          var isEpg = url.indexOf('epg') !== -1 && !cleanUrl.endsWith('.ts');
          var isPicon = url.indexOf('/p/') !== -1 && !cleanUrl.endsWith('.ts');
          
          if ((isPlaylist || isEpg || isPicon) && url.indexOf('iptvin.ru') === -1) {
            arguments[0] = window.location.origin + '/proxy?url=' + encodeURIComponent(url);
          }
        }
        return originalFetch.apply(this, arguments);
      };

      var originalXhrOpen = window.XMLHttpRequest.prototype.open;
      window.XMLHttpRequest.prototype.open = function(method, url) {
        if (typeof url === 'string') {
          var cleanUrl = url.split('?')[0];
          var isPlaylist = cleanUrl.endsWith('.m3u') || cleanUrl.endsWith('.m3u8');
          var isEpg = url.indexOf('epg') !== -1 && !cleanUrl.endsWith('.ts');
          var isPicon = url.indexOf('/p/') !== -1 && !cleanUrl.endsWith('.ts');

          if ((url.indexOf('http://') === 0 || url.indexOf('https://') === 0) && url.indexOf(window.location.hostname) === -1 && url.indexOf('iptvin.ru') === -1) {
            if (isPlaylist || isEpg || isPicon) {
              arguments[1] = window.location.origin + '/proxy?url=' + encodeURIComponent(url);
            }
          }
        }
        return originalXhrOpen.apply(this, arguments);
      };
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js"></script>
    <script>
      window.addEventListener('load', function() {
        if (!window.shaka) return;
        shaka.polyfill.installAll();
        if (!shaka.Player.isBrowserSupported()) {
          console.error('Browser not supported!');
          return;
        }

        var isSmartTV = navigator.userAgent.indexOf('Tizen') !== -1 || navigator.userAgent.indexOf('Web0S') !== -1;
        shaka.net.NetworkingEngine.registerRequestFilter(function(type, request) {
          // On Smart TVs (Tizen/WebOS), apps usually have CORS disabled via config.xml.
          // Bypassing the proxy on TV prevents our Datacenter IP from being blocked (403).
          if (isSmartTV) return;

          var PROXY_BASE = window.location.origin + '/proxy?url=';
          if (request.uris[0].indexOf('iptvin.ru') === -1 && request.uris[0].indexOf('/proxy') === -1 && request.uris[0].indexOf('blob:') !== 0) {
            request.uris[0] = PROXY_BASE + encodeURIComponent(request.uris[0]);
          }
        });

        var shakaInstances = new WeakMap();
        var observer = new MutationObserver(function(mutations) {
          mutations.forEach(function(mutation) {
            if (mutation.type === 'attributes' && mutation.attributeName === 'src') {
              handleVideo(mutation.target);
            }
            if (mutation.addedNodes) {
              mutation.addedNodes.forEach(function(node) {
                if (node.tagName === 'VIDEO') {
                  handleVideo(node);
                  observeVideo(node);
                } else if (node.querySelectorAll) {
                  var videos = node.querySelectorAll('video');
                  videos.forEach(function(v) {
                    handleVideo(v);
                    observeVideo(v);
                  });
                }
              });
            }
          });
        });
        observer.observe(document.body, { childList: true, subtree: true });

        function observeVideo(v) {
          new MutationObserver(function(m) {
            m.forEach(function(mut) {
              if (mut.type === 'attributes' && mut.attributeName === 'src') {
                handleVideo(mut.target);
              }
            });
          }).observe(v, {attributes: true});
        }

        function handleVideo(video) {
          var src = video.getAttribute('src') || video.src;
          if (!src) return;
          if (src.indexOf('blob:') === 0) return; // already shaka
          
          if (src && window.shaka) {
            var player = shakaInstances.get(video);
            if (player) {
              player.destroy().then(startNewLoad);
            } else {
              startNewLoad();
            }
            
            function startNewLoad() {
              player = new shaka.Player(video);
              shakaInstances.set(video, player);
              
              video.removeAttribute('src');
              if (video.src && video.src.indexOf('blob:') === -1) {
                video.src = '';
              }
              
              player.configure({
                streaming: {
                  bufferingGoal: 30,
                  rebufferingGoal: 2,
                  bufferBehind: 30,
                },
                manifest: {
                  retryParameters: {
                    maxAttempts: 3,
                  }
                }
              });
              
              player.load(src).then(function() {
                video.play().catch(function(e){});
              }).catch(function(e) {
                console.error('Shaka Error', e); video.src = src; video.play().catch(function(){});
              });
            }
          }
        }
      });
    </script>

    <script>
      (function() {
        var currentFocus = null;
        var focusHistoryText = "";
        var focusHistoryCx = 0;
        var focusHistoryCy = 0;

        function getFocusableElements() {
          var els = Array.from(document.querySelectorAll('[tabindex="0"], a, button, input, [role="button"], [role="link"]'));
          return els.filter(function(el) {
            var rect = el.getBoundingClientRect();
            return rect.width > 0 && rect.height > 0 && window.getComputedStyle(el).visibility !== 'hidden' && window.getComputedStyle(el).display !== 'none';
          });
        }
        function setFocus(el) {
          if (currentFocus) {
            currentFocus.classList.remove('tv-focus');
            currentFocus.blur();
          }
          currentFocus = el;
          if (currentFocus) {
            currentFocus.classList.add('tv-focus');
            currentFocus.focus();
            currentFocus.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
          }
        }
        window.addEventListener('load', function() {
          var style = document.createElement('style');
          style.innerHTML = '.tv-focus { outline: 4px solid #00f0ff !important; box-shadow: 0 0 15px #00f0ff !important; border-radius: 8px; z-index: 9999; position: relative; }';
          document.head.appendChild(style);
          setTimeout(function() {
            var els = getFocusableElements();
            if (els.length > 0) setFocus(els[0]);
          }, 1500);
        });
        window.addEventListener('keydown', function(e) {
          var keyCode = e.keyCode;
          if (keyCode === 8 || keyCode === 27 || keyCode === 461 || keyCode === 10009) {
             return;
          }
            if ([37, 38, 39, 40].indexOf(keyCode) !== -1) {
              if (currentFocus) {
                focusHistoryText = currentFocus.textContent || "";
                var r = currentFocus.getBoundingClientRect();
                focusHistoryCx = r.left + r.width/2;
                focusHistoryCy = r.top + r.height/2;
              }
              
              e.stopPropagation(); e.preventDefault();
              var els = getFocusableElements();
              if (els.length === 0) return;
              
              if (!currentFocus || !document.body.contains(currentFocus) || els.indexOf(currentFocus) === -1) { 
                var bestNode = els[0];
                if (focusHistoryText) {
                  var matches = els.filter(function(el) { return (el.textContent || "") === focusHistoryText; });
                  if (matches.length > 0) {
                    bestNode = matches[0];
                  } else {
                    var bestDist = Infinity;
                    els.forEach(function(el) {
                      var r2 = el.getBoundingClientRect();
                      var cx2 = r2.left + r2.width/2;
                      var cy2 = r2.top + r2.height/2;
                      var dist = Math.sqrt(Math.pow(cx2 - focusHistoryCx, 2) + Math.pow(cy2 - focusHistoryCy, 2));
                      if (dist < bestDist) { bestDist = dist; bestNode = el; }
                    });
                  }
                }
                setFocus(bestNode); 
                return; 
              }
  
              var rect1 = currentFocus.getBoundingClientRect();
              var cx1 = rect1.left + rect1.width / 2, cy1 = rect1.top + rect1.height / 2;
              var bestNode = null, bestDist = Infinity;
              els.forEach(function(el) {
                if (el === currentFocus) return;
                var rect2 = el.getBoundingClientRect(), cx2 = rect2.left + rect2.width / 2, cy2 = rect2.top + rect2.height / 2;
                var dx = cx2 - cx1, dy = cy2 - cy1;
                if ((keyCode === 39 && dx > 0 && Math.abs(dx) > Math.abs(dy)) ||
                    (keyCode === 37 && dx < 0 && Math.abs(dx) > Math.abs(dy)) ||
                    (keyCode === 40 && dy > 0 && Math.abs(dy) > Math.abs(dx)) ||
                    (keyCode === 38 && dy < 0 && Math.abs(dy) > Math.abs(dx))) {
                  var dist = Math.sqrt(dx*dx + dy*dy);
                  if (dist < bestDist) { bestDist = dist; bestNode = el; }
                }
              });
              if (bestNode) setFocus(bestNode);
            }
        }, true);
      })();
    </script>

    <script>
      window.onerror = function(msg, url, line, col, error) {
        var errDiv = document.createElement('div');
        errDiv.style.position = 'fixed';
        errDiv.style.top = '10%';
        errDiv.style.left = '10%';
        errDiv.style.right = '10%';
        errDiv.style.backgroundColor = 'red';
        errDiv.style.color = 'white';
        errDiv.style.padding = '20px';
        errDiv.style.zIndex = '999999';
        errDiv.style.fontSize = '24px';
        errDiv.innerHTML = "<h2>CRASH!</h2><p>" + msg + "</p><p>" + url + ":" + line + ":" + col + "</p><pre>" + (error && error.stack ? error.stack : '') + "</pre>";
        document.body.appendChild(errDiv);
        return false;
      };

      
      // Polyfill KeyboardEvent.key for older TV webviews (React Native Web requires this)
      if (typeof KeyboardEvent !== 'undefined' && !('key' in KeyboardEvent.prototype)) {
        Object.defineProperty(KeyboardEvent.prototype, 'key', {
          get: function() {
            if (this.keyCode === 13) return 'Enter';
            if (this.keyCode === 37) return 'ArrowLeft';
            if (this.keyCode === 38) return 'ArrowUp';
            if (this.keyCode === 39) return 'ArrowRight';
            if (this.keyCode === 40) return 'ArrowDown';
            if (this.keyCode === 27 || this.keyCode === 461 || this.keyCode === 10009) return 'Escape';
            if (this.keyCode === 32) return ' ';
            return 'Unidentified';
          }
        });
      }
    </script>
