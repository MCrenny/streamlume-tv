# ⚠️ ВАЖНО: Перед деплоем собери проект локально!
# 1. Открой терминал в папке streamlume-tv
# 2. Выполни: npm run build
# 3. Закоммить всё (включая dist/) в GitHub
# 4. Подключи репозиторий к Render

services:
  - type: web
    name: streamlume-tv
    env: node
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20
