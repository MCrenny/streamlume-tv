name: Update Playlists

# Автоматически скачивает плейлисты раз в сутки и коммитит их в репозиторий.
# После коммита Netlify автоматически пересобирает сайт → плейлисты становятся
# доступны по адресу streamlume-tv.netlify.app/playlists/*.m3u
#
# Запуски:
#   - по расписанию (ежедневно в 03:00 по Москве / 00:00 UTC)
#   - вручную (кнопка "Run workflow" во вкладке Actions)
#   - при изменении scripts/playlist-manifest.json

on:
  schedule:
    # 00:00 UTC = 03:00 MSK (каждый день)
    - cron: '0 0 * * *'
  workflow_dispatch: # ручной запуск
  push:
    branches:
      - main
    paths:
      - 'scripts/playlist-manifest.json'

permissions:
  contents: write # нужно для git commit/push в той же ветке

concurrency:
  group: update-playlists
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch playlists
        run: node scripts/fetch-playlists.js

      - name: Stage and check for changes
        id: changes
        run: |
          # Сначала git add, чтобы .gitattributes применил нормализацию CRLF→LF.
          # Иначе git status покажет изменения, а git commit потом скажет
          # "nothing to commit" и упадёт с exit 1 под bash -e.
          git add playlists/
          # Проверяем ИМЕННО staging (а не working tree) — это надёжно.
          changed_files=$(git diff --cached --name-only playlists/)
          if [ -n "$changed_files" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "::notice::Playlists changed: $(echo "$changed_files" | tr '\n' ' ')"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "::notice::No changes — playlists are byte-identical to previous version"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        # `|| true` — страховка: даже если git commit скажет "nothing to commit"
        # в каком-то граничном случае, workflow не упадёт.
        run: |
          # [skip ci] предотвращает рекурсивный запуск (двойная защита с paths-filter).
          git commit -m "chore(playlists): daily auto-update [skip ci]

          Automated by .github/workflows/update-playlists.yml
          Source: scripts/playlist-manifest.json" || echo "Nothing to commit — already up to date"
          git push

      - name: Summary
        run: |
          echo "### Playlist update summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.changes.outputs.changed }}" == "true" ]; then
            echo "✅ Playlists updated and committed. Netlify will redeploy automatically." >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ No changes — playlists are identical to previous version." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Files in playlists/**:" >> $GITHUB_STEP_SUMMARY
          ls -la playlists/ | tail -n +2 | awk '{print "- `" $9 "` — " $5 " bytes"}' >> $GITHUB_STEP_SUMMARY
