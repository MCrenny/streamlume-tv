    <script>
      window.addEventListener('load', function() {
        var hlsInstances = new WeakMap();
        var observer = new MutationObserver(function(mutations) {
          mutations.forEach(function(mutation) {
            if (mutation.type === 'attributes' && mutation.attributeName === 'src') {
              handleVideo(mutation.target);
            }
            if (mutation.addedNodes) {
              mutation.addedNodes.forEach(function(node) {
                if (node.tagName === 'VIDEO') {
                  handleVideo(node);
                  observeVideo(node);
                } else if (node.querySelectorAll) {
                  var videos = node.querySelectorAll('video');
                  videos.forEach(function(v) {
                    handleVideo(v);
                    observeVideo(v);
                  });
                }
              });
            }
          });
        });
        observer.observe(document.body, { childList: true, subtree: true });

        function observeVideo(v) {
          new MutationObserver(function(m) {
            m.forEach(function(mut) {
              if (mut.type === 'attributes' && mut.attributeName === 'src') {
                handleVideo(mut.target);
              }
            });
          }).observe(v, {attributes: true});
        }

        function handleVideo(video) {
          var src = video.getAttribute('src') || video.src;
          if (!src) return;
          if (src.indexOf('blob:') === 0) return; // already hls.js
          
          var isSmartTV = navigator.userAgent.indexOf('Tizen') !== -1 || navigator.userAgent.indexOf('Web0S') !== -1;
          
          if (src && src.indexOf('blob:') !== 0 && window.Hls && Hls.isSupported() && !isSmartTV) {
            var hls = hlsInstances.get(video);
            if (hls) { hls.destroy(); }
            
            hls = new Hls({
              maxBufferLength: 30,
              maxMaxBufferLength: 60,
              backBufferLength: 30,
              capLevelToPlayerSize: true,
              liveSyncDurationCount: 3
            });
            hlsInstances.set(video, hls);
            
            // Remove native src so it doesn't conflict
            video.removeAttribute('src');
            if (video.src && video.src.indexOf('blob:') === -1) {
              video.src = '';
            }
            
            hls.loadSource(src);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
              video.play().catch(function(e){});
            });
            
            // --- ERROR RECOVERY ---
            hls.on(Hls.Events.ERROR, function(event, data) {
              if (data.fatal) {
                console.warn("HLS Error:", data.type, data.details);
                switch (data.type) {
                  case Hls.ErrorTypes.NETWORK_ERROR:
                    // Try to reconnect after a short delay
                    setTimeout(function() {
                      hls.startLoad();
                    }, 2000);
                    break;
                  case Hls.ErrorTypes.MEDIA_ERROR:
                    hls.recoverMediaError();
                    break;
                  default:
                    // Hard Restart: destroy and recreate the whole instance
                    hls.destroy();
                    setTimeout(function() {
                      handleVideo(video, src);
                    }, 2000);
                    break;
                }
              }
            });
          }
        }
      });
    </script>

    <script>
      (function() {
        var currentFocus = null;
        var focusHistoryText = "";
        var focusHistoryCx = 0;
        var focusHistoryCy = 0;

        function getFocusableElements() {
          var els = Array.from(document.querySelectorAll('[tabindex="0"], a, button, input, [role="button"], [role="link"]'));
          return els.filter(function(el) {
            var rect = el.getBoundingClientRect();
            return rect.width > 0 && rect.height > 0 && window.getComputedStyle(el).visibility !== 'hidden' && window.getComputedStyle(el).display !== 'none';
          });
        }
        function setFocus(el) {
          if (currentFocus) {
            currentFocus.classList.remove('tv-focus');
            currentFocus.blur();
          }
          currentFocus = el;
          if (currentFocus) {
            currentFocus.classList.add('tv-focus');
            currentFocus.focus();
            currentFocus.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
          }
        }
        window.addEventListener('load', function() {
          var style = document.createElement('style');
          style.innerHTML = '.tv-focus { outline: 4px solid #00f0ff !important; box-shadow: 0 0 15px #00f0ff !important; border-radius: 8px; z-index: 9999; position: relative; }';
          document.head.appendChild(style);
          setTimeout(function() {
            var els = getFocusableElements();
            if (els.length > 0) setFocus(els[0]);
          }, 1500);
        });
        window.addEventListener('keydown', function(e) {
          var keyCode = e.keyCode;
          if (keyCode === 8 || keyCode === 27 || keyCode === 461 || keyCode === 10009) {
             return;
          }
            if ([37, 38, 39, 40].indexOf(keyCode) !== -1) {
              if (currentFocus) {
                focusHistoryText = currentFocus.textContent || "";
                var r = currentFocus.getBoundingClientRect();
                focusHistoryCx = r.left + r.width/2;
                focusHistoryCy = r.top + r.height/2;
              }
              
              e.stopPropagation(); e.preventDefault();
              var els = getFocusableElements();
              if (els.length === 0) return;
              
              if (!currentFocus || !document.body.contains(currentFocus) || els.indexOf(currentFocus) === -1) { 
                var bestNode = els[0];
                if (focusHistoryText) {
                  var matches = els.filter(function(el) { return (el.textContent || "") === focusHistoryText; });
                  if (matches.length > 0) {
                    bestNode = matches[0];
                  } else {
                    var bestDist = Infinity;
                    els.forEach(function(el) {
                      var r2 = el.getBoundingClientRect();
                      var cx2 = r2.left + r2.width/2;
                      var cy2 = r2.top + r2.height/2;
                      var dist = Math.sqrt(Math.pow(cx2 - focusHistoryCx, 2) + Math.pow(cy2 - focusHistoryCy, 2));
                      if (dist < bestDist) { bestDist = dist; bestNode = el; }
                    });
                  }
                }
                setFocus(bestNode); 
                return; 
              }
  
              var rect1 = currentFocus.getBoundingClientRect();
              var cx1 = rect1.left + rect1.width / 2, cy1 = rect1.top + rect1.height / 2;
              var bestNode = null, bestDist = Infinity;
              els.forEach(function(el) {
                if (el === currentFocus) return;
                var rect2 = el.getBoundingClientRect(), cx2 = rect2.left + rect2.width / 2, cy2 = rect2.top + rect2.height / 2;
                var dx = cx2 - cx1, dy = cy2 - cy1;
                if ((keyCode === 39 && dx > 0 && Math.abs(dx) > Math.abs(dy)) ||
                    (keyCode === 37 && dx < 0 && Math.abs(dx) > Math.abs(dy)) ||
                    (keyCode === 40 && dy > 0 && Math.abs(dy) > Math.abs(dx)) ||
                    (keyCode === 38 && dy < 0 && Math.abs(dy) > Math.abs(dx))) {
                  var dist = Math.sqrt(dx*dx + dy*dy);
                  if (dist < bestDist) { bestDist = dist; bestNode = el; }
                }
              });
              if (bestNode) setFocus(bestNode);
            }
        }, true);
      })();
    </script>
    <script>
      // ====================================================================
      // Универсальный фикс высоты плиток каналов (для старых Tizen/webOS).
      //
      // Проблема: React Native Web переводит aspectRatio:1.35/1.4/1.3 из
      // исходника в CSS-свойство `aspect-ratio`, которое поддерживается
      // только в Chrome 79+ (2020). Старые Tizen 2.x-4.x / webOS 1-3
      // (Chrome 38-56) его игнорируют -> у карточек нет высоты -> плитки
      // "плоские/резиновые". На Android TV (новый WebView) работает само.
      //
      // Решение (ОДНО для всех устройств, без определения модели):
      // измерить реальную ширину карточки и задать ей явную высоту
      // width / ratio. offsetWidth доступен везде, с 1990-х. На Android
      // результат совпадает с тем, что давал aspect-ratio (нет регрессии);
      // на старом Tizen плитки получают корректную высоту и заполняют
      // область. Режим (6/8/4 колонки или список) определяется по числу
      // карточек в ряду в живом DOM — универсально, без имён режимов.
      //
      // Безопасность: НЕ трогает движок навигации, .tv-focus, выбор
      // [role=button]. Карточки списка (без aspect-ratio) не затрагиваются.
      // Если скрипт не отработал — поведение ровно как раньше (не хуже).
      // ====================================================================
      (function () {
        // Соотношение сторон по числу колонок в ряду (из исходника):
        // normal=6 -> 1.35, small=8 -> 1.4, large=4 -> 1.3.
        function ratioForColumns(n) {
          if (n <= 1) return 0;            // список — не трогаем
          if (n <= 4) return 1.3;          // большие
          if (n <= 6) return 1.35;         // обычные
          return 1.4;                       // маленькие (>=7)
        }

        // Это плитка канала? Признак: элемент [role=button] с inline
        // стилем aspect-ratio (ставит RNW из aspectRatio:1.35/1.4/1.3).
        // Карточки списка (width:'96%', без aspect-ratio) сюда не попадают.
        function isChannelTile(el) {
          if (!el || el.getAttribute('role') !== 'button') return false;
          var st = el.style && el.style.aspectRatio;
          if (st) return true;            // современный DOM inline style
          // Запасной путь: getComputedStyle (inline, не cascaded) — старые
          // движки могут не держать style.aspectRatio как свойство, но
          // getComputedStyle.cssText обычно содержит "aspect-ratio:".
          try {
            var ct = el.style && el.style.cssText;
            if (ct && ct.indexOf('aspect-ratio') !== -1) return true;
          } catch (e) {}
          return false;
        }

        // Сколько плиток в одном ряду (по Y-центру)? Универсальное
        // определение числа колонок без знания режима или устройства.
        function detectColumns(tiles) {
          if (tiles.length === 0) return 0;
          // Возьмём первый ряд: плитки, чей Y-центр близок к первой.
          var first = tiles[0].getBoundingClientRect();
          var y0 = first.top + first.height / 2;
          var tol = Math.max(8, first.height * 0.5);
          var count = 0;
          for (var i = 0; i < tiles.length; i++) {
            var r = tiles[i].getBoundingClientRect();
            var yc = r.top + r.height / 2;
            if (Math.abs(yc - y0) <= tol) count++;
          }
          return count;
        }

        var running = false;
        function fixTileHeights() {
          if (running) return;
          running = true;
          try {
            // Все [role=button] на странице, оставляем только плитки.
            var cand = document.querySelectorAll('[role="button"]');
            var tiles = [];
            for (var i = 0; i < cand.length; i++) {
              if (isChannelTile(cand[i])) tiles.push(cand[i]);
            }
            if (tiles.length === 0) { running = false; return; }

            var cols = detectColumns(tiles);
            var ratio = ratioForColumns(cols);
            if (!ratio) { running = false; return; } // список — пропускаем

            for (var j = 0; j < tiles.length; j++) {
              var el = tiles[j];
              var w = el.offsetWidth;
              if (!w) continue;
              // box-sizing:border-box, чтобы padding/border не раздували
              // плитку поверх заданной высоты.
              el.style.boxSizing = 'border-box';
              el.style.height = Math.round(w / ratio) + 'px';
            }
          } catch (e) {
            // Молча: любой сбой -> поведение как раньше (без фикс), не краш.
          } finally {
            running = false;
          }
        }

        // Планировщик: debounce + requestAnimationFrame, чтобы не молотить
        // при шквале изменений (виртуализация FlatList при скролле).
        var scheduled = false;
        function schedule() {
          if (scheduled) return;
          scheduled = true;
          var raf = window.requestAnimationFrame || function (cb) { return setTimeout(cb, 16); };
          raf(function () {
            scheduled = false;
            fixTileHeights();
          });
        }

        function start() {
          // Первичный проход — после того, как каналы отрендерились.
          // Несколько попыток с задержкой (данные грузятся асинхронно).
          schedule();
          setTimeout(schedule, 600);
          setTimeout(schedule, 1500);
          setTimeout(schedule, 3000);

          // Пересчёт при появлении новых рядов (виртуализация, смена
          // категории/режима). Observer на document — плоско и надёжно.
          var MO = window.MutationObserver;
          if (MO) {
            var obs = new MO(function () { schedule(); });
            obs.observe(document.body, { childList: true, subtree: true });
          }
          // Пересчёт при ресайзе/повороте.
          window.addEventListener('resize', schedule);
          window.addEventListener('orientationchange', schedule);
          // Пересчёт после скролла (могут появиться новые ряды).
          window.addEventListener('scroll', schedule, true);
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', start);
        } else {
          start();
        }
      })();
