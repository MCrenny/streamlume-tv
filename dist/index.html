    <script>
      window.addEventListener('load', function() {
        var hlsInstances = new WeakMap();
        var observer = new MutationObserver(function(mutations) {
          mutations.forEach(function(mutation) {
            if (mutation.type === 'attributes' && mutation.attributeName === 'src') {
              handleVideo(mutation.target);
            }
            if (mutation.addedNodes) {
              mutation.addedNodes.forEach(function(node) {
                if (node.tagName === 'VIDEO') {
                  handleVideo(node);
                  observeVideo(node);
                } else if (node.querySelectorAll) {
                  var videos = node.querySelectorAll('video');
                  videos.forEach(function(v) {
                    handleVideo(v);
                    observeVideo(v);
                  });
                }
              });
            }
          });
        });
        observer.observe(document.body, { childList: true, subtree: true });

        function observeVideo(v) {
          new MutationObserver(function(m) {
            m.forEach(function(mut) {
              if (mut.type === 'attributes' && mut.attributeName === 'src') {
                handleVideo(mut.target);
              }
            });
          }).observe(v, {attributes: true});
        }

        function handleVideo(video) {
          var src = video.getAttribute('src') || video.src;
          if (!src) return;
          if (src.indexOf('blob:') === 0) return; // already hls.js
          
          var isSmartTV = navigator.userAgent.indexOf('Tizen') !== -1 || navigator.userAgent.indexOf('Web0S') !== -1;
          
          if (src && src.indexOf('blob:') !== 0 && window.Hls && Hls.isSupported() && !isSmartTV) {
            var hls = hlsInstances.get(video);
            if (hls) { hls.destroy(); }
            
            hls = new Hls({
              maxBufferLength: 30,
              maxMaxBufferLength: 60,
              backBufferLength: 30,
              capLevelToPlayerSize: true,
              liveSyncDurationCount: 3
            });
            hlsInstances.set(video, hls);
            
            // Remove native src so it doesn't conflict
            video.removeAttribute('src');
            if (video.src && video.src.indexOf('blob:') === -1) {
              video.src = '';
            }
            
            hls.loadSource(src);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
              video.play().catch(function(e){});
            });
            
            // --- ERROR RECOVERY ---
            hls.on(Hls.Events.ERROR, function(event, data) {
              if (data.fatal) {
                console.warn("HLS Error:", data.type, data.details);
                switch (data.type) {
                  case Hls.ErrorTypes.NETWORK_ERROR:
                    // Try to reconnect after a short delay
                    setTimeout(function() {
                      hls.startLoad();
                    }, 2000);
                    break;
                  case Hls.ErrorTypes.MEDIA_ERROR:
                    hls.recoverMediaError();
                    break;
                  default:
                    // Hard Restart: destroy and recreate the whole instance
                    hls.destroy();
                    setTimeout(function() {
                      handleVideo(video, src);
                    }, 2000);
                    break;
                }
              }
            });
          }
        }
      });
    </script>

    <script>
      (function() {
        var currentFocus = null;
        var focusHistoryText = "";
        var focusHistoryCx = 0;
        var focusHistoryCy = 0;

        function getFocusableElements() {
          var els = Array.from(document.querySelectorAll('[tabindex="0"], a, button, input, [role="button"], [role="link"]'));
          return els.filter(function(el) {
            var rect = el.getBoundingClientRect();
            return rect.width > 0 && rect.height > 0 && window.getComputedStyle(el).visibility !== 'hidden' && window.getComputedStyle(el).display !== 'none';
          });
        }
        function setFocus(el) {
          if (currentFocus) {
            currentFocus.classList.remove('tv-focus');
            currentFocus.blur();
          }
          currentFocus = el;
          if (currentFocus) {
            currentFocus.classList.add('tv-focus');
            currentFocus.focus();
            // Manual minimal scroll: only move if the element is OUT of view,
            // and only by the amount needed. Avoids the "jump to center" jerk
            // and the FlatList/scrollIntoView fight that pulled content up.
            try {
              var rect = el.getBoundingClientRect();
              var vh = window.innerHeight || document.documentElement.clientHeight;
              var margin = 40;
              if (rect.top < margin) {
                window.scrollBy(0, rect.top - margin);
              } else if (rect.bottom > vh - margin) {
                window.scrollBy(0, rect.bottom - (vh - margin));
              }
            } catch (err) {}
          }
        }
        window.addEventListener('load', function() {
          var style = document.createElement('style');
          style.innerHTML = '.tv-focus { outline: 4px solid #00f0ff !important; box-shadow: 0 0 15px #00f0ff !important; border-radius: 8px; z-index: 9999; position: relative; }';
          document.head.appendChild(style);
          setTimeout(function() {
            var els = getFocusableElements();
            if (els.length === 0) return;
            // Prefer a focusable that is lower on the page (channel grid),
            // not the top header buttons, so initial focus lands on content.
            var best = els[0];
            for (var i = 0; i < els.length; i++) {
              var r = els[i].getBoundingClientRect();
              if (r.top > 40 && r.width > 80 && r.height > 40) { best = els[i]; break; }
            }
            setFocus(best);
          }, 1500);
        });
        window.addEventListener('keydown', function(e) {
          var keyCode = e.keyCode;
          if (keyCode === 8 || keyCode === 27 || keyCode === 461 || keyCode === 10009) {
             return;
          }
            if ([37, 38, 39, 40].indexOf(keyCode) !== -1) {
              // ===== DIAGNOSTIC OVERLAY (temporary) =====
              window.__sl_lastKey = {37:'LEFT',38:'UP',39:'RIGHT',40:'DOWN'}[keyCode];
              window.__sl_lastFocus = currentFocus;
              (function(){
                var dbg = document.getElementById('__sl_dbg');
                if(!dbg){
                  dbg = document.createElement('div'); dbg.id='__sl_dbg';
                  dbg.style.cssText='position:fixed;left:8px;bottom:8px;z-index:9999999;background:#000;color:#0f0;font:12px monospace;padding:6px 10px;max-width:70vw;white-space:pre;border:2px solid #0f0;border-radius:6px;pointer-events:none;';
                  document.body.appendChild(dbg);
                }
              })();
              // ===== END DIAGNOSTIC =====
              if (currentFocus) {
                focusHistoryText = currentFocus.textContent || "";
                var r = currentFocus.getBoundingClientRect();
                focusHistoryCx = r.left + r.width/2;
                focusHistoryCy = r.top + r.height/2;
              }
              
              e.stopPropagation(); e.preventDefault();
              var els = getFocusableElements();
              if (els.length === 0) return;
              
              if (!currentFocus || !document.body.contains(currentFocus) || els.indexOf(currentFocus) === -1) { 
                var bestNode = els[0];
                if (focusHistoryText) {
                  var matches = els.filter(function(el) { return (el.textContent || "") === focusHistoryText; });
                  if (matches.length > 0) {
                    bestNode = matches[0];
                  } else {
                    var bestDist = Infinity;
                    els.forEach(function(el) {
                      var r2 = el.getBoundingClientRect();
                      var cx2 = r2.left + r2.width/2;
                      var cy2 = r2.top + r2.height/2;
                      var dist = Math.sqrt(Math.pow(cx2 - focusHistoryCx, 2) + Math.pow(cy2 - focusHistoryCy, 2));
                      if (dist < bestDist) { bestDist = dist; bestNode = el; }
                    });
                  }
                }
                setFocus(bestNode); 
                return; 
              }
  
              // Geometric neighbor search within a candidate list (for left/right & sidebar)
              function findNeighbor(candidates, origin) {
                var r0 = origin.getBoundingClientRect();
                var ox = r0.left + r0.width / 2, oy = r0.top + r0.height / 2;
                var best = null, bestDist = Infinity;
                candidates.forEach(function(el) {
                  if (el === origin) return;
                  var r2 = el.getBoundingClientRect();
                  if (r2.width === 0 || r2.height === 0) return;
                  var cx2 = r2.left + r2.width / 2, cy2 = r2.top + r2.height / 2;
                  var dx = cx2 - ox, dy = cy2 - oy;
                  if ((keyCode === 39 && dx > 0 && Math.abs(dx) >= Math.abs(dy)) ||
                      (keyCode === 37 && dx < 0 && Math.abs(dx) >= Math.abs(dy)) ||
                      (keyCode === 40 && dy > 0 && Math.abs(dy) >= Math.abs(dx)) ||
                      (keyCode === 38 && dy < 0 && Math.abs(dy) >= Math.abs(dx))) {
                    var dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < bestDist) { bestDist = dist; best = el; }
                  }
                });
                return best;
              }

              // TABLE navigation for the channel grid: move up/down by ROWS in the
              // SAME column, so the cursor walks straight down instead of jumping
              // sideways or pulling the page up. Left/right stays in the same row.
              function findGridNeighbor(gridEls, origin) {
                var r0 = origin.getBoundingClientRect();
                var colLeft = r0.left, colRight = r0.right;
                var isVertical = (keyCode === 38 || keyCode === 40);

                if (!isVertical) {
                  // Left/right: nearest in the same row, correct direction.
                  // Use centers and a generous vertical tolerance because RNW
                  // tiles can have small sub-pixel offsets between siblings.
                  var cy0 = r0.top + r0.height / 2;
                  var cx0 = r0.left + r0.width / 2;
                  var tol = Math.max(r0.height * 0.5, 20);
                  var best = null, bestDist = Infinity;
                  gridEls.forEach(function(el) {
                    if (el === origin) return;
                    var r2 = el.getBoundingClientRect();
                    if (r2.width === 0 || r2.height === 0) return;
                    var cy2 = r2.top + r2.height / 2;
                    var cx2 = r2.left + r2.width / 2;
                    var sameRow = Math.abs(cy2 - cy0) < tol;
                    var inDir = (keyCode === 39 && cx2 > cx0) || (keyCode === 37 && cx2 < cx0);
                    if (sameRow && inDir) {
                      var d = Math.abs(cx2 - cx0);
                      if (d < bestDist) { bestDist = d; best = el; }
                    }
                  });
                  return best;
                }

                // Vertical: find element in the SAME COLUMN, next/prev row.
                // "Same column" = horizontal overlap with the origin tile.
                var colBest = null, colBestDist = Infinity;
                gridEls.forEach(function(el) {
                  if (el === origin) return;
                  var r2 = el.getBoundingClientRect();
                  if (r2.width === 0 || r2.height === 0) return;
                  var dy = r2.top - r0.top;
                  var inDir = (keyCode === 40 && dy > 2) || (keyCode === 38 && dy < -2);
                  // horizontal overlap: same column
                  var overlap = !(r2.right < colLeft + 4 || r2.left > colRight - 4);
                  if (inDir && overlap) {
                    var d = Math.abs(dy);
                    if (d < colBestDist) { colBestDist = d; colBest = el; }
                  }
                });
                if (colBest) return colBest;

                // No tile below/above in this column yet (e.g. FlatList hasn't
                // rendered the next row). Return null - do NOT fall back to
                // full-page here, otherwise the cursor escapes the grid.
                return null;
              }

              // Detect the channel grid: the scrollable area holding many tiles.
              // Heuristic: a container with >2 focusable children that wrap in rows.
              var grid = null;
              var pg = currentFocus.parentElement;
              while (pg && pg !== document.body) {
                var ge = Array.from(pg.querySelectorAll('[tabindex="0"], [role="button"], [role="link"]')).filter(function(el){
                  var rr = el.getBoundingClientRect(); return rr.width > 0 && rr.height > 0;
                });
                if (ge.length > 2) { grid = ge; break; }
                pg = pg.parentElement;
              }

              var bestNode = null;
              // In the grid -> use strict table navigation (keeps column on up/down)
              if (grid && grid.indexOf(currentFocus) !== -1) {
                bestNode = findGridNeighbor(grid, currentFocus);
              }
              // Not a grid (sidebar/header) or grid gave nothing sideways -> geometric
              if (!bestNode) {
                var scoped = [];
                var p = currentFocus.parentElement;
                while (p && p !== document.body) {
                  var scopedEls = Array.from(p.querySelectorAll('[tabindex="0"], a, button, input, [role="button"], [role="link"]'));
                  var visibleScoped = scopedEls.filter(function(el){ var rr = el.getBoundingClientRect(); return rr.width > 0 && rr.height > 0; });
                  if (visibleScoped.length > 1) { scoped = visibleScoped; break; }
                  p = p.parentElement;
                }
                bestNode = scoped.length ? findNeighbor(scoped, currentFocus) : findNeighbor(els, currentFocus);
              }
              // Last-resort horizontal move in the grid: pick the closest tile
              // sharing the same vertical center, in the pressed direction.
              // Guarantees left/right never gets stuck even if scoping missed.
              if (!bestNode && (keyCode === 37 || keyCode === 39) && grid) {
                var r0h = currentFocus.getBoundingClientRect();
                var cy0h = r0h.top + r0h.height / 2;
                var cx0h = r0h.left + r0h.width / 2;
                var tolh = Math.max(r0h.height * 0.6, 24);
                var hb = null, hbd = Infinity;
                grid.forEach(function(el){
                  if (el === currentFocus) return;
                  var rr = el.getBoundingClientRect();
                  if (rr.width === 0) return;
                  var cyx = rr.top + rr.height / 2, cxx = rr.left + rr.width / 2;
                  if (Math.abs(cyx - cy0h) < tolh) {
                    var inDir = (keyCode === 39 && cxx > cx0h) || (keyCode === 37 && cxx < cx0h);
                    if (inDir) { var dd = Math.abs(cxx - cx0h); if (dd < hbd) { hbd = dd; hb = el; } }
                  }
                });
                if (hb) bestNode = hb;
              }
              // ===== DIAGNOSTIC: show what was found =====
              (function(){
                var dbg = document.getElementById('__sl_dbg');
                if (dbg) {
                  var k = window.__sl_lastKey;
                  var f = window.__sl_lastFocus;
                  var fr = f ? f.getBoundingClientRect() : null;
                  var ft = f ? (f.textContent||'').trim().slice(0,14) : 'NULL';
                  var nr = bestNode ? bestNode.getBoundingClientRect() : null;
                  var nt = bestNode ? (bestNode.textContent||'').trim().slice(0,14) : 'NONE';
                  dbg.textContent =
                    'KEY:'+k+
                    '\nGRID:'+(grid?('yes('+grid.length+')'):'no')+
                    '\nIN_GRID:'+(grid&&f?(grid.indexOf(f)!==-1?'yes':'NO'):'?')+
                    '\nFOCUS:'+ft+' ['+(fr?Math.round(fr.left)+','+Math.round(fr.top):'?')+']'+
                    '\nNEXT:'+nt+(nr?(' ['+Math.round(nr.left)+','+Math.round(nr.top)+']'):'');
                }
              })();
              // ===== END DIAGNOSTIC =====
              if (bestNode) setFocus(bestNode);
            }
        }, true);
      })();
    </script>

      if (typeof KeyboardEvent !== 'undefined' && !('key' in KeyboardEvent.prototype)) {

          get: function() {
            if (this.keyCode === 13) return 'Enter';
