# Netlify configuration — StreamLume TV
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Прокси для медиа
[[redirects]]
  from = "/proxy"
  to = "/.netlify/functions/proxy"
  status = 200

# SPA fallback (все пути → index.html)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Кеширование ассетов навсегда
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_expo/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
